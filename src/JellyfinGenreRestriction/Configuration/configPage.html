<!DOCTYPE html>
<html lang="en">
<head>
    <title>Genre Restriction Configuration</title>
</head>
<body>
    <div data-role="page" class="page type-interior pluginConfigurationPage withTabs" id="genreRestrictionConfigPage">
        <div data-role="content">
            <div class="content-primary">
                <h1>Genre Restriction Plugin</h1>
                <p>Configure genre restrictions per user.</p>
                <form id="genreRestrictionConfigForm">

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused">Add User Restriction</label>
                        <div style="display: flex; gap: 10px; align-items: center; margin-bottom: 1em;">
                            <select id="userSelect" is="emby-select" class="emby-select" style="max-width: 200px;">
                            </select>
                            <input type="text" id="genreInput" class="emby-input" placeholder="e.g. Horror" style="max-width: 200px;" />
                            <button type="button" id="addRestrictionBtn" is="emby-button" class="raised emby-button">
                                <span>Add Selection</span>
                            </button>
                        </div>
                    </div>
                    
                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused">Active Restrictions:</label>
                        <div class="paperList">
                            <ul id="userPoliciesList" style="list-style-type: none; padding: 0;">
                            </ul>
                        </div>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="genreToTagMap">Genre to Tag Mappings (JSON format):</label>
                        <textarea id="genreToTagMap" name="genreToTagMap" class="emby-textarea" rows="4"></textarea>
                    </div>

                    <div class="inputContainer">
                        <label class="inputLabel inputLabelUnfocused" for="enableScheduledTagSync">
                            <input type="checkbox" is="emby-checkbox" id="enableScheduledTagSync" />
                            <span>Enable Scheduled Tag Sync</span>
                        </label>
                    </div>

                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <script type="text/javascript">
            (function() {
                var pluginId = "0f7a2491-c50d-4b06-b601-a0e7d3db6b8e";
                var currentPolicies = [];
                var usersMap = {};

                function renderPolicies(page) {
                    var html = '';
                    currentPolicies.forEach(function(policy, pIndex) {
                        var userName = usersMap[policy.UserId] || policy.UserId;
                        policy.BlockedGenres.forEach(function(genre, gIndex) {
                            html += '<li style="display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #333;">';
                            html += '<span><strong>' + userName + '</strong> - ' + genre + '</span>';
                            html += '<button type="button" is="emby-button" class="emby-button" style="color:red;" onclick="window.removeGenreRestriction(' + pIndex + ', ' + gIndex + ')">Remove</button>';
                            html += '</li>';
                        });
                    });
                    if (html === '') {
                        html = '<li>No restrictions configured.</li>';
                    }
                    $('#userPoliciesList', page).html(html);
                }

                window.removeGenreRestriction = function(pIndex, gIndex) {
                    if (currentPolicies[pIndex]) {
                        currentPolicies[pIndex].BlockedGenres.splice(gIndex, 1);
                        if (currentPolicies[pIndex].BlockedGenres.length === 0) {
                            currentPolicies.splice(pIndex, 1);
                        }
                        var page = $('#genreRestrictionConfigPage');
                        renderPolicies(page);
                    }
                };

                $('#genreRestrictionConfigPage').on('pageshow', function () {   
                    var page = this;
                    Dashboard.showLoadingMsg();

                    ApiClient.getUsers().then(function(users) {
                        var selectHtml = '';
                        users.forEach(function(u) {
                            usersMap[u.Id] = u.Name;
                            selectHtml += '<option value="' + u.Id + '">' + u.Name + '</option>';
                        });
                        $('#userSelect', page).html(selectHtml);

                        ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                            currentPolicies = config.UserPolicies || [];
                            renderPolicies(page);

                            $('#genreToTagMap', page).val(JSON.stringify(config.GenreToTagMap || {}, null, 2));
                            $('#enableScheduledTagSync', page).prop('checked', config.EnableScheduledTagSync || false);

                            Dashboard.hideLoadingMsg();
                        });
                    });
                });

                $('#addRestrictionBtn').on('click', function(e) {
                    e.preventDefault();
                    var page = $(this).parents('#genreRestrictionConfigPage');
                    var userId = $('#userSelect', page).val();
                    var genre = $('#genreInput', page).val().trim();

                    if (!userId || !genre) {
                        alert("Please select a user and enter a genre.");
                        return;
                    }

                    var policy = currentPolicies.find(function(p) { return p.UserId === userId; });
                    if (!policy) {
                        policy = { UserId: userId, BlockedGenres: [] };
                        currentPolicies.push(policy);
                    }

                    if (policy.BlockedGenres.indexOf(genre) === -1) {
                        policy.BlockedGenres.push(genre);
                    }

                    $('#genreInput', page).val('');
                    renderPolicies(page);
                });

                $('#genreRestrictionConfigForm').on('submit', function (e) {    
                    e.preventDefault();
                    var page = $(this).parents('#genreRestrictionConfigPage');  
                    Dashboard.showLoadingMsg();

                    ApiClient.getPluginConfiguration(pluginId).then(function (config) {
                        try {
                            config.GenreToTagMap = JSON.parse($('#genreToTagMap', page).val());
                        } catch(err) {
                            alert("Invalid JSON format in the Genre to Tag Mappings box. Please correct it to valid JSON and try saving again.");
                            Dashboard.hideLoadingMsg();
                            return;
                        }

                        config.UserPolicies = currentPolicies;
                        config.EnableScheduledTagSync = $('#enableScheduledTagSync', page).prop('checked');

                        ApiClient.updatePluginConfiguration(pluginId, config).then(function (result) {
                            Dashboard.processPluginConfigurationUpdateResult(result);
                        });
                    });

                    return false;
                });
            })();
        </script>
    </div>
</body>
</html>
